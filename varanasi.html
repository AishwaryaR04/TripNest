<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — TripNest</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #0d1b2e;
      --blue: #3b7df5;
      --white: #ffffff;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .wrapper {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-style: italic;
      margin-bottom: 15px;
    }

    p {
      color: rgba(255,255,255,0.7);
      margin-bottom: 30px;
      font-size: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      border-radius: 30px;
      background: var(--blue);
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

  </style>
</head>
<body>

  <div class="wrapper">
    <h1>Coming Soon</h1>
    <p>This feature is currently under development. We're working hard to bring it to you soon ✨</p>
    <a href="index.html" class="btn">Back to Home</a>
  </div>

</body>
</html>
