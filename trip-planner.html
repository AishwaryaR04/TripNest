<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Planner — TripNest</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0d1b2e;
      --blue-cta: #3b7df5;
      --blue-cta-hover: #2563eb;
      --white: #ffffff;
      --label-color: #6b7280;
      --divider: #e5e7eb;
      --text-dark: #111827;
      --text-mid: #374151;
      --bg-input: #f9fafb;
      --card-shadow: 0 20px 80px rgba(0,0,0,0.32);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      background-color: var(--navy);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Dark city background ── */
    .hero-bg {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg,
          rgba(8,18,34,0.74) 0%,
          rgba(10,22,42,0.84) 60%,
          rgba(8,16,30,0.93) 100%),
        url('images/bg-travel.jpg') center/cover no-repeat;
      z-index: 0;
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 0%, rgba(30,60,120,0.32) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Navbar ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 52px;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.92rem;
      color: var(--white);
      text-decoration: none;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { opacity: 1; }
    .nav-dots { font-size: 1.2rem; color: var(--white); letter-spacing: 2px; }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 130px 40px 80px;
      max-width: 1160px;
      margin: 0 auto;
    }

    /* ── Hero heading ── */
    .hero-text {
      text-align: center;
      margin-bottom: 44px;
      animation: fadeUp 0.65s cubic-bezier(0.22,1,0.36,1) both;
    }
    .hero-text h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .hero-text h1 span { color: #60a5fa; }
    .hero-text p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Two-column grid ── */
    .planner-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 24px;
      animation: fadeUp 0.75s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── White card (shared) ── */
    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 18px;
      padding: 28px 28px 24px;
      box-shadow: var(--card-shadow);
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 22px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--divider);
    }

    /* ── Form fields ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--label-color);
      margin-bottom: 7px;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 11px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-dark);
      background: var(--bg-input);
      border: 1px solid var(--divider);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field textarea { resize: vertical; min-height: 88px; }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--blue-cta);
      box-shadow: 0 0 0 3px rgba(59,125,245,0.12);
      background: #fff;
    }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      background: var(--blue-cta);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 4px 22px rgba(59,125,245,0.38);
      margin-top: 10px;
    }
    .btn:hover {
      background: var(--blue-cta-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(59,125,245,0.46);
    }
    .btn.secondary {
      background: transparent;
      border: 1.5px solid var(--blue-cta);
      color: var(--blue-cta);
      box-shadow: none;
      margin-top: 8px;
    }
    .btn.secondary:hover {
      background: var(--blue-cta);
      color: #fff;
      box-shadow: 0 4px 22px rgba(59,125,245,0.3);
    }

    /* ── Trip name display ── */
    .trip-name-display {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--blue-cta);
      text-align: center;
      margin-bottom: 6px;
      min-height: 1.5em;
    }

    /* ── Timeline ── */
    .timeline-wrap { position: relative; padding-left: 28px; margin-bottom: 20px; }
    .timeline-wrap::before {
      content: '';
      position: absolute;
      left: 10px; top: 0;
      width: 2px; height: 100%;
      background: linear-gradient(to bottom, var(--blue-cta), rgba(59,125,245,0.15));
    }

    .day-card {
      background: #f9fafb;
      border: 1px solid var(--divider);
      border-left: 3px solid var(--blue-cta);
      border-radius: 12px;
      padding: 16px 16px 14px;
      margin-bottom: 14px;
      position: relative;
    }
    .day-card::before {
      content: '';
      position: absolute;
      left: -20px; top: 18px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--blue-cta);
      border: 2px solid #fff;
      box-shadow: 0 0 0 2px var(--blue-cta);
    }

    .day-card h4 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .day-card p {
      font-size: 0.83rem;
      color: var(--text-mid);
      margin-bottom: 3px;
      line-height: 1.5;
    }
    .day-card p b { color: var(--text-dark); font-weight: 500; }

    .day-actions {
      position: absolute;
      top: 12px; right: 12px;
      display: flex;
      gap: 6px;
    }
    .day-actions button {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .day-actions button:hover { opacity: 0.85; transform: scale(1.1); }
    .btn-edit  { background: var(--blue-cta); color: #fff; }
    .btn-del   { background: #ef4444; color: #fff; }

    /* ── Budget summary ── */
    .budget-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }
    .budget-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }
    .budget-box .b-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #60a5fa;
      margin-bottom: 4px;
    }
    .budget-box .b-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-size: 0.88rem;
    }
    .empty-state .icon { font-size: 2.4rem; margin-bottom: 10px; }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      nav { padding: 18px 20px; }
      .nav-links { display: none; }
      .page { padding: 100px 16px 60px; }
      .planner-grid { grid-template-columns: 1fr; }
      .budget-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="hero-bg"></div>

<!-- Navbar -->
<nav>
  <a href="index.html" class="nav-logo">TripNest</a>
  <ul class="nav-links">
    <li><a href="compare.html">Compare</a></li>
    <li><a href="travel-checklist.html">Travel Checklist</a></li>
    <li><a href="trip-planner.html" class="active">Trip Planner</a></li>
    <li><a href="about.html">About</a></li>
    
  </ul>
</nav>

<div class="page">

  <!-- Hero heading -->
  <div class="hero-text">
    <h1>Plan Your <span>Next Trip</span></h1>
    <p>Must-See Attractions. Unbeatable Prices. Exclusively for You!</p>
  </div>

  <div class="planner-grid">

    <!-- FORM CARD -->
    <div class="card">
      <div class="card-title">Trip Details</div>

      <div class="field">
        <label>Trip Name</label>
        <input type="text" id="tripName" placeholder="Ex: Ooty Weekend Trip" oninput="updateTripName()" />
      </div>
      <div class="field">
        <label>Number of Members</label>
        <input type="number" id="members" value="1" min="1" />
      </div>
      <div class="field">
        <label>Budget per Person (₹)</label>
        <input type="number" id="budgetPerPerson" placeholder="0" />
      </div>
      <div class="field">
        <label>Place</label>
        <input type="text" id="place" placeholder="Destination" />
      </div>
      <div class="field">
        <label>Transport</label>
        <select id="transport">
          <option>Bus</option>
          <option>Train</option>
          <option>Flight</option>
          <option>Car</option>
        </select>
      </div>
      <div class="field">
        <label>Itinerary</label>
        <textarea id="activities" placeholder="Describe the day's activities…"></textarea>
      </div>

      <button class="btn" onclick="addDay()">Add / Update Day</button>
      <button class="btn secondary" onclick="exportPDF()">Export Trip as PDF</button>
    </div>

    <!-- TIMELINE CARD -->
    <div class="card" id="pdfContent">
      <div class="trip-name-display" id="tripTitle">My Trip</div>
      <div class="card-title" style="margin-top:4px;">Trip Timeline</div>

      <div class="timeline-wrap" id="timeline">
        <div class="empty-state">
          <div class="icon">🗺️</div>
          Add your first day to get started
        </div>
      </div>

      <div class="budget-row">
        <div class="budget-box">
          <div class="b-label">Total Budget</div>
          <div class="b-value" id="totalBudget">₹0</div>
        </div>
        <div class="budget-box">
          <div class="b-label">Per Member</div>
          <div class="b-value" id="perMember">₹0</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  let tripData = JSON.parse(localStorage.getItem('tripData')) || [];
  let editIndex = null;

  const membersInput       = document.getElementById('members');
  const budgetPerPersonInput = document.getElementById('budgetPerPerson');
  const placeInput         = document.getElementById('place');
  const transportInput     = document.getElementById('transport');
  const activitiesInput    = document.getElementById('activities');

  function renderTimeline() {
    const timeline = document.getElementById('timeline');
    const members  = Number(membersInput.value) || 1;
    let total = 0;

    if (tripData.length === 0) {
      timeline.innerHTML = `<div class="empty-state"><div class="icon">🗺️</div>Add your first day to get started</div>`;
      document.getElementById('totalBudget').textContent = '₹0';
      document.getElementById('perMember').textContent   = '₹0';
      return;
    }

    timeline.innerHTML = '';
    tripData.forEach((day, i) => {
      total += day.dayBudget;
      const div = document.createElement('div');
      div.className = 'day-card';
      div.innerHTML = `
        <h4>Day ${i + 1} — ${day.place}</h4>
        <p><b>Transport:</b> ${day.transport}</p>
        <p><b>Itinerary:</b> ${day.activities || '—'}</p>
        <p><b>Day Budget:</b> ₹${day.dayBudget.toLocaleString('en-IN')}</p>
        <div class="day-actions">
          <button class="btn-edit" title="Edit" onclick="editDay(${i})">✏️</button>
          <button class="btn-del"  title="Delete" onclick="deleteDay(${i})">✖</button>
        </div>
      `;
      timeline.appendChild(div);
    });

    document.getElementById('totalBudget').textContent = '₹' + total.toLocaleString('en-IN');
    document.getElementById('perMember').textContent   = '₹' + Math.ceil(total / members).toLocaleString('en-IN');
  }

  function addDay() {
    const place    = placeInput.value.trim();
    const budget   = Number(budgetPerPersonInput.value);
    const members  = Number(membersInput.value) || 1;

    if (!place || !budget) return alert('Please fill in Place and Budget fields.');

    const dayBudget = members * budget;
    const dayData   = {
      place,
      transport:  transportInput.value,
      activities: activitiesInput.value.trim(),
      dayBudget
    };

    if (editIndex !== null) {
      tripData[editIndex] = dayData;
      editIndex = null;
    } else {
      tripData.push(dayData);
    }

    localStorage.setItem('tripData', JSON.stringify(tripData));
    placeInput.value = '';
    activitiesInput.value = '';
    renderTimeline();
  }

  function editDay(index) {
    const d = tripData[index];
    placeInput.value      = d.place;
    transportInput.value  = d.transport;
    activitiesInput.value = d.activities;
    editIndex = index;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteDay(index) {
    if (!confirm('Delete this day?')) return;
    tripData.splice(index, 1);
    localStorage.setItem('tripData', JSON.stringify(tripData));
    renderTimeline();
  }

  function updateTripName() {
    const name = document.getElementById('tripName').value.trim() || 'My Trip';
    document.getElementById('tripTitle').textContent = name;
    localStorage.setItem('tripName', name);
  }

  function exportPDF() {
    html2pdf().from(document.getElementById('pdfContent')).save('Trip_Plan.pdf');
  }

  membersInput.addEventListener('input', renderTimeline);

  // Restore saved data
  const savedName = localStorage.getItem('tripName');
  if (savedName) {
    document.getElementById('tripTitle').textContent = savedName;
    document.getElementById('tripName').value        = savedName;
  }

  renderTimeline();
</script>
</body>
</html>
